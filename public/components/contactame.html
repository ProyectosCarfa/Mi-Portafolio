<!-- contact.html -->
<section id="contact" class="contact-section">
    <div class="container">
        <!-- Banner de la sección -->
        <div class="contact-banner">
            <img src="./assets/img/banners/banner-img4.png" alt="Contacto Banner" class="contact-banner-image">
            <div class="contact-banner-content">
                <h2>Contáctame</h2>
                <p>¿Tienes un proyecto en mente? ¡Hablemos!</p>
                <div class="banner-line"></div>
            </div>
        </div>

        <!-- Contenido principal de contacto -->
        <div class="contact-wrapper">
            <!-- Personajes flork - Lado izquierdo -->
            <div class="contact-characters">
                <div class="character-card">
                    <img src="./assets/img/fLorck/flork-Listen.png" alt="Listen" class="character-img">
                    <p>Escucho tus ideas</p>
                </div>
                <div class="character-card">
                    <img src="./assets/img/fLorck/flork-motivation.png" alt="Motivation" class="character-img">
                    <p>Te motivaré</p>
                </div>
                <div class="character-card">
                    <img src="./assets/img/fLorck/flork-programming.png" alt="Programming" class="character-img">
                    <p>Programamos juntos</p>
                </div>
            </div>

            <!-- Formulario de contacto - Lado derecho -->
            <div class="contact-form-wrapper">
                <h3>Envíame un mensaje</h3>
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <input type="text" id="nombre" placeholder="Nombre completo" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Correo electrónico" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="asunto" placeholder="Asunto">
                    </div>
                    <div class="form-group">
                        <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">
                        <span>Enviar mensaje</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- Información de contacto adicional con imagen al costado -->
        <div class="contact-info-footer">
            <div class="contact-info-items">
                <div class="info-item">
                    <div class="info-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="1.5">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.574 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </div>
                    <div class="info-text">
                        <h4>Teléfono</h4>
                        <p>+51 937 140 055</p>
                    </div>
                </div>
                <br>
                <div class="info-item">
                    <div class="info-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="1.5">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                    <div class="info-text">
                        <h4>Email</h4>
                        <p>carlos@alvines.com</p>
                    </div>
                </div>
                <br>
                <div class="info-item">
                    <div class="info-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="1.5">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </div>
                    <div class="info-text">
                        <h4>Ubicación</h4>
                        <p>Perú</p>
                    </div>
                </div>
            </div>
            <div class="img-presentacion">
                <div class="img-presentacion-content">
                    <img src="./assets/img/tegnologias/Tegnologias-flork.png" alt="Proyectos">
                </div>
            </div>
        </div>
    </div>
</section>
